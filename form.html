<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Salomey Bempomaa Toah">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <meta name="description" content="Share your product feedback by rating features, installation date, and overall experience in this comprehensive product review form.">
    <meta name="author" content="Salomey Bempomaa Toah">

    <title>Product Review</title>

    <!-- CSS -->
    <link rel="stylesheet" href="styles/form.css">

    <!-- JS -->
    <script defer src="scripts/form.js"></script>
</head>

<body>

<header>
    <h1>Product Review</h1>
</header>

<main>

    <form method="get" action="review.html">

        <!-- PRODUCT NAME -->
        <div class="form-group">
            <label for="product">Product Name</label>

            <select id="product" name="product" required autocomplete="off">
                <option value="" disabled selected>Select a Product ...</option>
                <!-- JS will populate options here -->
            </select>
        </div>

        <!-- OVERALL RATING -->
        <div class="form-group">
            <p>Overall Rating</p>

            <!-- ⭐ All radios share SAME name -->
            <label for="rating1">
                <input type="radio" id="rating1" name="rating" value="1" required>
                ☆
            </label>

            <label for="rating2">
                <input type="radio" id="rating2" name="rating" value="2" required>
                ☆☆
            </label>

            <label for="rating3">
                <input type="radio" id="rating3" name="rating" value="3" required>
                ☆☆☆
            </label>

            <label for="rating4">
                <input type="radio" id="rating4" name="rating" value="4" required>
                ☆☆☆☆
            </label>

            <label for="rating5">
                <input type="radio" id="rating5" name="rating" value="5" required>
                ☆☆☆☆☆
            </label>
        </div>

        <!-- DATE -->
        <div class="form-group">
            <label for="installDate">Date of Installation</label>
            <input type="date" id="installDate" name="installDate" required autocomplete="off">
        </div>

        <!-- FEATURES -->
        <div class="form-group">
            <p>Which features did you find useful? (Check all that apply)</p>

            <label for="durability">
                <input type="checkbox" id="durability" name="features" value="Durability">
                Durability
            </label>

            <label for="ease">
                <input type="checkbox" id="ease" name="features" value="Ease of Use">
                Ease of Use
            </label>

            <label for="performance">
                <input type="checkbox" id="performance" name="features" value="Performance">
                Performance
            </label>

            <label for="design">
                <input type="checkbox" id="design" name="features" value="Design">
                Design
            </label>
        </div>

        <!-- REVIEW -->
        <div class="form-group">
            <label for="review">Written Review <span class="optional">(optional)</span></label>
            <textarea id="review" name="review" rows="4" autocomplete="off"></textarea>
        </div>

        <!-- NAME -->
        <div class="form-group">
            <label for="username">Your Name <span class="optional">(optional)</span></label>
            <input type="text" id="username" name="username" autocomplete="name">
        </div>

        <!-- SUBMIT -->
        <div class="form-group">
            <input type="submit" value="Post Review">
        </div>

    </form>

</main>

<footer>
    <p>&copy; <span id="year"></span> 🌷Salomey Bempomaa Toah🌷</p>
    <p id="lastModified"></p>
</footer>

</body>
</html>
