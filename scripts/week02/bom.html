<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book of Mormon Favorite Chapters</title>
    <meta name="description" content="Book of Mormon favorite chapters app for WDD131">
    <meta name="author" content="Salomey Bempomaa Toah">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Acme&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="styless/bom.css">
</head>
<body>
    <main>
        <h1>📖 Book of Mormon - Top 10</h1>
        
        <div class="input-container">
            <label for="favchap">Enter Book and Chapter:</label>
            <input type="text" id="favchap" placeholder="Alma 5" value="Alma 5">
            <button type="submit" id="submit-btn">Add Chapter</button>
        </div>
        
        <ul id="list">
            <li>
                Alma 5
                <button aria-label="Remove Alma 5">❌</button>
            </li>
        </ul>
    </main>
    
    <!-- JavaScript -->
    <script src="scripts/bom.js"></script>
</body>
</html>
