<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <meta name="description" content="Site plan for Travel Explorer - a website helping users discover global destinations and plan their perfect trips.">
    <meta name="author" content="Salomey Bempomaa Toah">
    <title>Plan Your Trip | Travel Explorer</title>

    <link rel="stylesheet" href="styles/siteplan.css">
    <script defer src="scripts/siteplan.js"></script>
</head>

<body>

<header>
    <h1>Travel Explorer</h1>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="destinations.html">Destinations</a></li>
            <li><a href="plan.html">Plan Your Trip</a></li>
        </ul>
    </nav>
</header>

<main>

    <section class="form-section">

        <h2>Plan Your Trip</h2>

        <form id="tripForm">

            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="destination">Select Destination</label>
                <select id="destination" required>
                    <option value="">-- Choose Destination --</option>
                    <option value="Maldives">Maldives</option>
                    <option value="Kenya">Kenya</option>
                    <option value="Paris">Paris</option>
                </select>
            </div>

            <div class="form-group">
                <label for="date">Travel Date</label>
                <input type="date" id="date" required>
            </div>

            <div class="form-group">
                <label for="people">Number of People</label>
                <input type="number" id="people" min="1" required>
            </div>

            <button type="submit">Plan Trip</button>

        </form>

        <div id="result"></div>

    </section>

</main>
<footer>
    <p>&copy; <span id="year"></span> Travel Explorer</p>
    <p><a href="references.html">References</a></p>
</footer>

</body>
</html>
