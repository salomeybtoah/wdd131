<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temple Album | WDD131</title>
    <meta name="description" content="Temple Album for WDD131 - Collection of temple images">
    <meta name="author" content="Salomey Bempomaa Toah">
    
    <!-- Preconnect for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Optimized Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    </noscript>
    
   <!-- Preload and load critical CSS in one -->
<link rel="preload" href="styles/temples.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript>
    <link rel="stylesheet" href="styles/temples.css">
</noscript>

<!-- Desktop CSS - loads asynchronously -->
<link rel="stylesheet" href="styles/temples-large.css" 
      media="print" 
      onload="this.media='screen and (min-width: 768px)'">
<noscript>
    <link rel="stylesheet" href="styles/temples-large.css" media="screen and (min-width: 768px)">
</noscript>
    
    <!-- Deferred JavaScript -->
    <script src="script/temple.js" defer></script>
</head>
<body>
    <header>
        <h1>Temple Album</h1>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Old</a></li>
                <li><a href="#">New</a></li>
                <li><a href="#">Large</a></li>
                <li><a href="#">Small</a></li>
            </ul>
        </nav>
    </header>
    
    <main>
        <div class="grid-container">
        
        <figure>
            <img src="images/salt-lake-temple.jpg" alt="Salt Lake Temple" width="800" height="600" fetchpriority="high">
            <figcaption>Salt Lake Temple</figcaption>
        </figure>

        <figure>
            <img src="images/hong-kong-china-temple.jpg" alt="Hong Kong China Temple" loading="lazy">
            <figcaption>Hong Kong China Temple</figcaption>
        </figure>
        
        <figure>
            <img src="images/accra-ghana-temple.jpg" alt="Ghana Accra Temple" loading="lazy">
            <figcaption>Ghana Accra Temple</figcaption>
        </figure>
        
        <figure>
            <img src="images/london-england-temple.jpg" alt="London England Temple" loading="lazy">
            <figcaption>London England Temple</figcaption>
        </figure>
        
        <figure>
            <img src="images/rome-italy-temple.jpg" alt="Rome Italy Temple" loading="lazy">
            <figcaption>Rome Italy Temple</figcaption>
        </figure>
        
        <figure>
            <img src="images/tokyo-japan-temple.jpg" alt="Tokyo Japan Temple" loading="lazy">
            <figcaption>Tokyo Japan Temple</figcaption>
        </figure>
        
        <figure>
            <img src="images/paris-france-temple.jpg" alt="Paris France Temple" loading="lazy">
            <figcaption>Paris France Temple</figcaption>
        </figure>
        
        <figure>
            <img src="images/sao-paulo-brazil-temple.jpg" alt="São Paulo Brazil Temple" loading="lazy">
            <figcaption>São Paulo Brazil Temple</figcaption>
        </figure>
        
        <figure>
            <img src="images/johannesburg-temple.jpg" alt="Johannesburg South Africa Temple" loading="lazy">
            <figcaption>Johannesburg South Africa Temple</figcaption>
        </figure>
        </div>
    </main>
    
    <footer>
        <p>©<span id="currentyear"></span> 🐝 Salomey Bempomaa Toah 🐝 Ghana</p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
